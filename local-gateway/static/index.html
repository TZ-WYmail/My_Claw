<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark" x-cloak>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a84ff">
  <meta name="description" content="LocalCommandCenter — 本地指挥中心">
  <title>LocalCommandCenter</title>

  <link rel="stylesheet" href="/static/css/variables.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/animations.css">
  <link rel="stylesheet" href="/static/css/layout.css">

  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png">

  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
<div class="app-shell" x-data>

  <!-- Sidebar -->
  <aside class="sidebar" :class="{ collapsed: $store.view.sidebarCollapsed }">
    <div class="sidebar-header">
      <span class="logo">🧠 LCC</span>
      <span class="version" x-text="$store.app.connected ? 'v' + $store.app.version : ''"></span>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item" :class="{ active: $store.view.isActive('dashboard') }"
              @click="$store.view.navigateTo('dashboard')">
        <span class="nav-icon">📊</span><span class="nav-label">仪表盘</span>
      </button>
      <button class="nav-item" :class="{ active: $store.view.isActive('tasks') }"
              @click="$store.view.navigateTo('tasks')">
        <span class="nav-icon">📋</span><span class="nav-label">任务</span>
      </button>
      <button class="nav-item" :class="{ active: $store.view.isActive('notes') }"
              @click="$store.view.navigateTo('notes')">
        <span class="nav-icon">📝</span><span class="nav-label">笔记</span>
      </button>
      <button class="nav-item" :class="{ active: $store.view.isActive('habits') }"
              @click="$store.view.navigateTo('habits')">
        <span class="nav-icon">🎯</span><span class="nav-label">习惯</span>
      </button>
      <button class="nav-item" :class="{ active: $store.view.isActive('calendar') }"
              @click="$store.view.navigateTo('calendar')">
        <span class="nav-icon">📅</span><span class="nav-label">日历</span>
      </button>

      <div class="nav-separator"></div>

      <button class="nav-item" :class="{ active: $store.view.isActive('ai-chat') }"
              @click="$store.view.navigateTo('ai-chat')">
        <span class="nav-icon">🤖</span><span class="nav-label">AI 对话</span>
      </button>
      <button class="nav-item" :class="{ active: $store.view.isActive('workflows') }"
              @click="$store.view.navigateTo('workflows')">
        <span class="nav-icon">⚡</span><span class="nav-label">工作流</span>
      </button>
      <button class="nav-item" :class="{ active: $store.view.isActive('sync') }"
              @click="$store.view.navigateTo('sync')">
        <span class="nav-icon">🔄</span><span class="nav-label">同步</span>
      </button>
      <button class="nav-item" :class="{ active: $store.view.isActive('download') }"
              @click="$store.view.navigateTo('download')">
        <span class="nav-icon">📥</span><span class="nav-label">下载</span>
      </button>
      <button class="nav-item" :class="{ active: $store.view.isActive('sandbox') }"
              @click="$store.view.navigateTo('sandbox')">
        <span class="nav-icon">🔧</span><span class="nav-label">沙盒</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <button class="nav-item" style="font-size:0.8rem" @click="$store.view.navigateTo('settings')"
              :class="{ active: $store.view.isActive('settings') }">
        <span class="nav-icon">⚙️</span><span class="nav-label">设置</span>
      </button>
      <div class="status-row">
        <span class="status-dot" :class="{ connected: $store.app.connected, error: !$store.app.connected }"></span>
        <span x-text="$store.app.connected ? '已连接' : '未连接'" style="font-size:0.75rem"></span>
      </div>
    </div>
  </aside>

  <!-- Main Area -->
  <main class="main-area">
    <div class="top-bar">
      <div class="top-bar-left">
        <button class="sidebar-toggle" @click="$store.view.toggleSidebar()" title="⌘B 折叠侧边栏">
          ☰
        </button>
        <h2 x-text="$store.view.viewNames[$store.view.current] || $store.view.current"></h2>
      </div>
      <div class="top-bar-right">
        <input id="global-search" class="global-search" type="text"
               placeholder="⌘K 搜索..." autocomplete="off">
        <button class="btn-icon btn-ghost" @click="$store.app.toggleTheme()"
                :title="$store.app.theme === 'dark' ? '切换亮色主题' : '切换暗色主题'">
          <span x-text="$store.app.theme === 'dark' ? '☀️' : '🌙'"></span>
        </button>
      </div>
    </div>

    <div class="view-container">
      <!-- Views injected here by router -->
      <div id="view-dashboard" x-show="$store.view.isActive('dashboard')"
           x-data="dashboard" x-transition.opacity.duration.250ms>

        <!-- Loading Skeleton -->
        <template x-if="loading">
          <div>
            <div class="stats-grid">
              <div class="stat-card" x-for="i in 4"><div class="skeleton" style="height:60px"></div></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md)">
              <div class="card"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text"></div></div>
              <div class="card"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text"></div></div>
            </div>
          </div>
        </template>

        <!-- Error State -->
        <template x-if="!loading && error">
          <div class="empty-state">
            <div class="empty-state-icon">⚠️</div>
            <div class="empty-state-text" x-text="error"></div>
            <button class="btn btn-primary" @click="load()">重试</button>
          </div>
        </template>

        <!-- Content -->
        <template x-if="!loading && !error">
          <div>
            <div class="stats-grid">
              <div class="stat-card"><div class="stat-icon">📋</div><div class="stat-info">
                <div class="stat-value" x-text="stats.tasks.pending"></div>
                <div class="stat-label">待执行任务</div>
              </div></div>
              <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-info">
                <div class="stat-value" x-text="stats.tasks.completed"></div>
                <div class="stat-label">已完成任务</div>
              </div></div>
              <div class="stat-card"><div class="stat-icon">📥</div><div class="stat-info">
                <div class="stat-value" x-text="stats.downloads.total"></div>
                <div class="stat-label">下载文件</div>
              </div></div>
              <div class="stat-card"><div class="stat-icon">💾</div><div class="stat-info">
                <div class="stat-value" x-text="stats.storage.total_size || '0 B'"></div>
                <div class="stat-label">磁盘占用</div>
              </div></div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md)">
              <div class="card">
                <div class="card-header"><h3>📥 最近下载</h3></div>
                <div class="activity-list">
                  <template x-if="recentDownloads.length === 0">
                    <div class="empty-state"><span class="empty-state-text">暂无下载记录</span></div>
                  </template>
                  <template x-for="d in recentDownloads" :key="d.created_at">
                    <div class="activity-item">
                      <span class="activity-icon">📥</span>
                      <span class="activity-text" x-text="d.filename || d.url"></span>
                      <span class="activity-time" x-text="formatTimeShort(d.created_at)"></span>
                    </div>
                  </template>
                </div>
              </div>
              <div class="card">
                <div class="card-header"><h3>📜 最近操作</h3></div>
                <div class="activity-list">
                  <template x-if="recentLogs.length === 0">
                    <div class="empty-state"><span class="empty-state-text">暂无操作记录</span></div>
                  </template>
                  <template x-for="l in recentLogs" :key="l.created_at">
                    <div class="activity-item">
                      <span class="activity-icon" x-text="operationIcon(l.operation)"></span>
                      <span class="activity-text" x-text="l.operation"></span>
                      <span class="activity-time" x-text="formatTimeShort(l.created_at)"></span>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>
<div id="view-tasks" x-show="$store.view.isActive('tasks')"
     x-data="tasks" x-transition.opacity.duration.250ms>

  <!-- Inner tabs: Weekly Calendar | All Tasks -->
  <div style="display:flex;gap:var(--space-sm);margin-bottom:var(--space-md)">
    <button class="btn btn-sm" :class="{ 'btn-primary': tab === 'week' }" @click="tab='week'">📅 周视图</button>
    <button class="btn btn-sm" :class="{ 'btn-primary': tab === 'all' }" @click="tab='all';loadAllTasks()">📋 全部任务</button>
    <div style="flex:1"></div>
    <button class="btn btn-primary btn-sm" @click="showNewTask=!showNewTask">+ 新建任务</button>
  </div>

  <!-- New Task Form -->
  <div x-show="showNewTask" class="card" style="margin-bottom:var(--space-md)" x-transition>
    <div class="card-header"><h3>✨ 新建任务</h3></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md)">
      <div class="form-group"><label>任务名称</label><input x-model="newTask.task_name" placeholder="e.g. 完成季度报告"></div>
      <div class="form-group"><label>截止时间</label><input type="datetime-local" x-model="newTask.due_time"></div>
      <div class="form-group"><label>优先级</label>
        <select x-model.number="newTask.priority">
          <option value="0">🔴 紧急</option><option value="1">🟠 高</option>
          <option value="2" selected>🟡 中</option><option value="3">🟢 低</option>
        </select>
      </div>
      <div class="form-group"><label>标签（逗号分隔）</label><input x-model="newTask.tags" placeholder="工作, 重要"></div>
    </div>
    <div class="form-group" style="margin-top:var(--space-md)"><label>描述</label><textarea x-model="newTask.description" rows="2"></textarea></div>
    <div style="display:flex;gap:var(--space-sm);margin-top:var(--space-md)">
      <button class="btn btn-primary" @click="addTask()">创建任务</button>
      <button class="btn" @click="showNewTask=false">取消</button>
    </div>
  </div>

  <!-- Weekly Calendar View -->
  <div x-show="tab==='week'">
    <div style="display:flex;align-items:center;gap:var(--space-sm);margin-bottom:var(--space-sm)">
      <button class="btn btn-sm" @click="loadWeeklyPlan(calWeekOffset-1)">◀</button>
      <span style="font-weight:600" x-text="weekLabel"></span>
      <button class="btn btn-sm" @click="loadWeeklyPlan(calWeekOffset+1)">▶</button>
      <button class="btn btn-sm" @click="loadWeeklyPlan(0)">本周</button>
    </div>
    <!-- Skeleton -->
    <div x-show="loadingCalendar" class="skeleton" style="height:400px"></div>
    <!-- Error State -->
    <div x-show="!loadingCalendar && calendarError" class="empty-state">
      <div class="empty-state-icon">⚠️</div>
      <div class="empty-state-text" x-text="calendarError"></div>
      <button class="btn btn-primary" @click="loadWeeklyPlan(calWeekOffset)">重试</button>
    </div>
    <!-- Calendar Grid -->
    <div x-show="!loadingCalendar && !calendarError" x-html="calendarHtml" class="wc-container"></div>
  </div>

  <!-- All Tasks Table -->
  <div x-show="tab==='all'">
    <div style="display:flex;gap:var(--space-sm);margin-bottom:var(--space-sm)">
      <input x-model="taskKeyword" @input="loadAllTasks(1)" placeholder="搜索任务..." style="max-width:200px">
      <select x-model="taskFilter" @change="loadAllTasks(1)" style="max-width:130px">
        <option value="active">进行中</option><option value="completed">已完成</option>
        <option value="pending">待执行</option><option value="deleted">已删除</option>
      </select>
    </div>
    <table class="data-table">
      <thead><tr><th>#</th><th>名称</th><th>截止</th><th>重复</th><th>状态</th><th>创建</th><th>操作</th></tr></thead>
      <tbody>
        <tr x-show="loadingTasks"><td colspan="7"><div class="skeleton" style="height:200px"></div></td></tr>
        <tr x-show="!loadingTasks && tasksError"><td colspan="7">
          <div class="empty-state" style="padding:var(--space-lg)">
            <div class="empty-state-icon">⚠️</div>
            <div class="empty-state-text" x-text="tasksError"></div>
            <button class="btn btn-primary" @click="loadAllTasks(taskPage)">重试</button>
          </div>
        </td></tr>
        <tr x-show="!loadingTasks && !tasksError && allTasks.length === 0"><td colspan="7" class="empty">无匹配任务</td></tr>
        <template x-for="(t, i) in allTasks" :key="t.task_id">
          <tr>
            <td x-text="(taskPage-1)*20 + i + 1"></td>
            <td x-text="t.task_name"></td>
            <td x-text="formatTime(t.due_time)"></td>
            <td x-text="RECURRENCE_MAP[t.recurrence] || t.recurrence"></td>
            <td><span class="badge" :class="'badge-'+badgeClass(t.status)" x-text="t.status"></span></td>
            <td x-text="formatTimeShort(t.created_at)"></td>
            <td x-html="taskActions(t)"></td>
          </tr>
        </template>
      </tbody>
    </table>
    <div class="pagination" x-show="taskTotalPages > 1">
      <button :disabled="taskPage<=1" @click="loadAllTasks(taskPage-1)">◀</button>
      <template x-for="p in taskTotalPages">
        <button :class="{active:p===taskPage}" @click="loadAllTasks(p)" x-text="p"></button>
      </template>
      <button :disabled="taskPage>=taskTotalPages" @click="loadAllTasks(taskPage+1)">▶</button>
    </div>
  </div>
</div>
      <div id="view-notes" x-show="$store.view.isActive('notes')"
           x-data="notes" x-transition.opacity.duration.250ms>

        <!-- Top Bar -->
        <div style="display:flex;gap:var(--space-sm);margin-bottom:var(--space-md)">
          <input x-model="keyword" @input.debounce.300ms="load()" placeholder="搜索笔记..." style="max-width:200px">
          <div style="flex:1"></div>
          <button class="btn btn-primary btn-sm" @click="showForm ? resetForm() : openNewForm()">
            <span x-text="showForm ? '取消' : '+ 新建笔记'"></span>
          </button>
        </div>

        <!-- New/Edit Note Form -->
        <div x-show="showForm" class="card" style="margin-bottom:var(--space-md)" x-transition>
          <div class="card-header"><h3 x-text="editingId ? '✏️ 编辑笔记' : '✨ 新建笔记'"></h3></div>
          <div class="form-group"><label>标题</label><input x-model="form.title" placeholder="笔记标题"></div>
          <div class="form-group"><label>内容</label><textarea x-model="form.content" rows="4" placeholder="写点什么..."></textarea></div>
          <div class="form-group"><label>标签（逗号分隔）</label><input x-model="form.tags" placeholder="工作, 学习, 灵感"></div>
          <div style="display:flex;gap:var(--space-sm);margin-top:var(--space-md)">
            <button class="btn btn-primary" @click="saveNote()" x-text="editingId ? '保存' : '创建'"></button>
            <button class="btn" @click="resetForm()">取消</button>
          </div>
        </div>

        <!-- Loading Skeleton -->
        <template x-if="loading">
          <div>
            <template x-for="i in 4">
              <div class="card" style="margin-bottom:var(--space-sm)">
                <div class="skeleton skeleton-text"></div>
                <div class="skeleton skeleton-text" style="width:60%"></div>
                <div class="skeleton" style="height:20px;width:120px;margin-top:var(--space-sm)"></div>
              </div>
            </template>
          </div>
        </template>

        <!-- Error State -->
        <template x-if="!loading && error">
          <div class="empty-state">
            <div class="empty-state-icon">⚠️</div>
            <div class="empty-state-text" x-text="error"></div>
            <button class="btn btn-primary" @click="load()">重试</button>
          </div>
        </template>

        <!-- Empty State -->
        <template x-if="!loading && !error && notes.length === 0">
          <div class="empty-state">
            <div class="empty-state-icon">📝</div>
            <div class="empty-state-text">还没有笔记</div>
            <button class="btn btn-primary" @click="openNewForm()">创建第一条笔记</button>
          </div>
        </template>

        <!-- Note Cards -->
        <template x-if="!loading && !error && notes.length > 0">
          <div>
            <div class="stats-grid" style="grid-template-columns:repeat(auto-fill,minmax(300px,1fr))">
              <template x-for="note in notes" :key="note.note_id">
                <div class="card">
                  <div class="card-header" style="border:none;padding-bottom:0">
                    <h3 x-text="note.title" style="font-size:1rem"></h3>
                  </div>
                  <div style="padding:var(--space-sm);font-size:0.875rem;color:var(--text-secondary)">
                    <p x-text="contentPreview(note.content)"></p>
                  </div>
                  <div style="padding:0 var(--space-sm) var(--space-sm)">
                    <template x-for="tag in (note.tags || [])" :key="tag">
                      <span class="badge badge-pending" x-text="tag" style="margin-right:4px"></span>
                    </template>
                  </div>
                  <div style="padding:0 var(--space-sm) var(--space-sm);display:flex;justify-content:space-between;align-items:center">
                    <span style="font-size:0.75rem;color:var(--text-tertiary)" x-text="formatTime(note.created_at)"></span>
                    <div style="display:flex;gap:4px">
                      <button class="btn btn-sm" @click="editNote(note)">编辑</button>
                      <button class="btn btn-sm btn-danger" @click="deleteNote(note.note_id)">删除</button>
                    </div>
                  </div>
                </div>
              </template>
            </div>
            <div style="margin-top:var(--space-sm);font-size:0.8rem;color:var(--text-tertiary)" x-show="total > 0">
              共 <span x-text="total"></span> 条笔记
            </div>
          </div>
        </template>
      </div>
      <div id="view-habits" x-show="$store.view.isActive('habits')"
           x-data="habits" x-transition.opacity.duration.250ms>

        <!-- Top Bar -->
        <div style="display:flex;gap:var(--space-sm);margin-bottom:var(--space-md)">
          <div style="flex:1"></div>
          <button class="btn btn-primary btn-sm" @click="showForm ? resetForm() : (showForm=true)">
            <span x-text="showForm ? '取消' : '+ 新建习惯'"></span>
          </button>
        </div>

        <!-- New Habit Form -->
        <div x-show="showForm" class="card" style="margin-bottom:var(--space-md)" x-transition>
          <div class="card-header"><h3>✨ 新建习惯</h3></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md)">
            <div class="form-group"><label>习惯名称</label><input x-model="form.name" placeholder="e.g. 每天跑步"></div>
            <div class="form-group"><label>频率</label>
              <select x-model="form.frequency">
                <option value="daily">每天</option><option value="weekly">每周</option><option value="monthly">每月</option>
              </select>
            </div>
            <div class="form-group"><label>目标次数</label><input type="number" x-model.number="form.target" min="1"></div>
          </div>
          <div class="form-group"><label>描述</label><textarea x-model="form.description" rows="2" placeholder="习惯描述..."></textarea></div>
          <div style="display:flex;gap:var(--space-sm);margin-top:var(--space-md)">
            <button class="btn btn-primary" @click="createHabit()">创建习惯</button>
            <button class="btn" @click="resetForm()">取消</button>
          </div>
        </div>

        <!-- Loading Skeleton -->
        <template x-if="loading">
          <div>
            <template x-for="i in 4">
              <div class="card" style="margin-bottom:var(--space-sm)">
                <div class="skeleton skeleton-text"></div>
                <div class="skeleton skeleton-text" style="width:40%"></div>
                <div class="skeleton" style="height:20px;width:80px;margin-top:var(--space-sm)"></div>
              </div>
            </template>
          </div>
        </template>

        <!-- Error State -->
        <template x-if="!loading && error">
          <div class="empty-state">
            <div class="empty-state-icon">⚠️</div>
            <div class="empty-state-text" x-text="error"></div>
            <button class="btn btn-primary" @click="load()">重试</button>
          </div>
        </template>

        <!-- Empty State -->
        <template x-if="!loading && !error && habits.length === 0">
          <div class="empty-state">
            <div class="empty-state-icon">🎯</div>
            <div class="empty-state-text">还没有习惯</div>
            <button class="btn btn-primary" @click="showForm=true">创建第一个习惯</button>
          </div>
        </template>

        <!-- Habit Cards -->
        <template x-if="!loading && !error && habits.length > 0">
          <div>
            <div class="stats-grid" style="grid-template-columns:repeat(auto-fill,minmax(300px,1fr))">
              <template x-for="habit in habits" :key="habit.habit_id">
                <div class="card">
                  <div class="card-header" style="border:none;padding-bottom:0">
                    <h3 x-text="habit.name" style="font-size:1rem"></h3>
                  </div>
                  <div style="padding:var(--space-sm);font-size:0.875rem;color:var(--text-secondary)">
                    <p x-text="habit.description || '暂无描述'"></p>
                  </div>
                  <div style="padding:0 var(--space-sm) var(--space-sm);display:flex;gap:var(--space-sm);align-items:center">
                    <span class="badge badge-pending" x-text="frequencyLabel(habit.frequency)"></span>
                    <span :class="{'streak-pop': checkingInId === habit.habit_id}" style="font-weight:600;font-size:1.1rem" x-text="streakLabel(habit.streak)"></span>
                  </div>
                  <div style="padding:0 var(--space-sm) var(--space-sm);display:flex;justify-content:space-between;align-items:center">
                    <button class="btn btn-sm btn-success" @click="checkin(habit.habit_id)" :disabled="checkingInId === habit.habit_id">
                      <span x-text="checkingInId === habit.habit_id ? '⏳...' : '✅ 打卡'"></span>
                    </button>
                    <button class="btn btn-sm btn-danger" @click="deleteHabit(habit.habit_id)">删除</button>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>

      <div id="view-download" x-show="$store.view.isActive('download')"
           x-data="download" x-transition.opacity.duration.250ms>

        <!-- Top Bar -->
        <div style="display:flex;gap:var(--space-sm);margin-bottom:var(--space-md)">
          <button class="btn btn-sm" @click="showBandwidth=!showBandwidth">
            <span x-text="showBandwidth ? '隐藏带宽' : '⚡ 带宽'"></span>
          </button>
          <div style="flex:1"></div>
          <span style="font-size:0.8rem;color:var(--text-tertiary);align-self:center" x-show="queue.length > 0">
            队列: <span x-text="queue.length"></span> 项
          </span>
        </div>

        <!-- Bandwidth Settings -->
        <div x-show="showBandwidth" class="card" style="margin-bottom:var(--space-md)" x-transition>
          <div class="card-header"><h3>⚡ 带宽控制</h3></div>
          <div style="display:flex;gap:var(--space-sm);align-items:flex-end">
            <div class="form-group" style="flex:1;margin-bottom:0">
              <label>带宽限制 (KB/s, 0=不限)</label>
              <input type="number" x-model="bandwidthLimit" min="0" placeholder="0">
            </div>
            <button class="btn btn-primary btn-sm" @click="saveBandwidth()">保存</button>
          </div>
          <div style="margin-top:var(--space-sm);font-size:0.8rem;color:var(--text-tertiary)">
            <span x-show="bandwidth?.current">当前速度: <span x-text="bandwidth.current"></span></span>
          </div>
        </div>

        <!-- New Download Form -->
        <div class="card" style="margin-bottom:var(--space-md)">
          <div class="card-header"><h3>📥 新建下载</h3></div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:var(--space-sm);align-items:flex-end">
            <div class="form-group" style="margin-bottom:0">
              <label>URL</label>
              <input x-model="form.url" placeholder="https://..." @keydown.enter="startDownload()">
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label>文件名 (可选)</label>
              <input x-model="form.filename" placeholder="filename.ext">
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label>分类 (可选)</label>
              <select x-model="form.category">
                <option value="">无</option>
                <option value="documents">文档</option>
                <option value="images">图片</option>
                <option value="videos">视频</option>
                <option value="music">音乐</option>
                <option value="archives">压缩包</option>
                <option value="other">其他</option>
              </select>
            </div>
            <button class="btn btn-primary" @click="startDownload()" style="height:40px;align-self:flex-end">添加</button>
          </div>
        </div>

        <!-- Loading Skeleton -->
        <template x-if="loading">
          <div>
            <template x-for="i in 3">
              <div class="card" style="margin-bottom:var(--space-sm)">
                <div class="skeleton skeleton-text"></div>
                <div class="skeleton skeleton-text" style="width:40%"></div>
                <div class="skeleton" style="height:24px;width:100%;margin-top:var(--space-sm)"></div>
              </div>
            </template>
          </div>
        </template>

        <!-- Error State -->
        <template x-if="!loading && error">
          <div class="empty-state">
            <div class="empty-state-icon">⚠️</div>
            <div class="empty-state-text" x-text="error"></div>
            <button class="btn btn-primary" @click="load()">重试</button>
          </div>
        </template>

        <!-- Empty State -->
        <template x-if="!loading && !error && queue.length === 0">
          <div class="empty-state">
            <div class="empty-state-icon">📥</div>
            <div class="empty-state-text">下载队列为空</div>
            <div class="empty-state-hint">输入 URL 开始下载</div>
          </div>
        </template>

        <!-- Download Queue -->
        <template x-if="!loading && !error && queue.length > 0">
          <div>
            <template x-for="job in queue" :key="getJobId(job)">
              <div class="card" style="margin-bottom:var(--space-sm)">
                <div style="display:flex;align-items:center;gap:var(--space-sm)">
                  <span style="font-size:1.2rem" x-text="statusIcon(job.status)"></span>
                  <div style="flex:1;min-width:0">
                    <div style="font-size:0.9rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
                         x-text="job.filename || job.url || job.name || '未知'"></div>
                    <div style="font-size:0.75rem;color:var(--text-tertiary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
                         x-text="job.url || ''"></div>
                  </div>
                  <span class="badge" :class="statusClass(job.status)" x-text="statusLabel(job.status)"></span>
                  <div style="display:flex;gap:4px;flex-shrink:0">
                    <button class="btn btn-sm" @click="pauseJob(getJobId(job))" :disabled="!canPause(job)"
                            title="暂停">⏸️</button>
                    <button class="btn btn-sm" @click="resumeJob(getJobId(job))" :disabled="!canResume(job)"
                            title="恢复">▶️</button>
                    <button class="btn btn-sm btn-danger" @click="cancelJob(getJobId(job))" :disabled="!canCancel(job)"
                            title="取消">✕</button>
                  </div>
                </div>
                <!-- Progress Bar -->
                <div style="margin-top:var(--space-sm);display:flex;align-items:center;gap:var(--space-sm)">
                  <div style="flex:1;height:6px;background:var(--bg-tertiary);border-radius:var(--radius-full);overflow:hidden">
                    <div style="height:100%;background:var(--accent);border-radius:var(--radius-full);transition:width var(--duration-normal)"
                         :style="'width:' + progressPercent(job) + '%'"></div>
                  </div>
                  <span style="font-size:0.8rem;color:var(--text-secondary);min-width:40px;text-align:right"
                        x-text="progressPercent(job) + '%'"></span>
                </div>
                <!-- Meta -->
                <div style="margin-top:4px;display:flex;gap:var(--space-md);font-size:0.75rem;color:var(--text-tertiary)">
                  <span x-show="job.size || job.total">大小: <span x-text="job.size || job.total"></span></span>
                  <span x-show="job.speed">速度: <span x-text="job.speed"></span></span>
                  <span x-show="job.category">分类: <span x-text="job.category"></span></span>
                  <span x-show="job.created_at || job.added_at">添加: <span x-text="formatTime(job.created_at || job.added_at)"></span></span>
                </div>
              </div>
            </template>
          </div>
        </template>
      </div>
      <div id="view-sandbox" x-show="$store.view.isActive('sandbox')"
           x-data="sandbox" x-transition.opacity.duration.250ms>

        <!-- Controls -->
        <div style="display:flex;gap:var(--space-sm);margin-bottom:var(--space-md);align-items:flex-end">
          <div class="form-group" style="margin-bottom:0;max-width:160px">
            <label>语言</label>
            <select x-model="language" @change="clearOutput()">
              <option value="python">Python</option>
              <option value="javascript">JavaScript</option>
              <option value="bash">Bash</option>
            </select>
          </div>
          <div class="form-group" style="margin-bottom:0;max-width:100px">
            <label>超时 (秒)</label>
            <input type="number" x-model.number="timeout" min="5" max="120">
          </div>
          <button class="btn btn-sm" @click="loadPreset('python')">Python 示例</button>
          <button class="btn btn-sm" @click="loadPreset('javascript')">JS 示例</button>
          <button class="btn btn-sm" @click="loadPreset('bash')">Bash 示例</button>
          <div style="flex:1"></div>
          <button class="btn btn-primary" @click="execute()" :disabled="executing || !code.trim()"
                  style="min-width:100px">
            <span x-text="executing ? '⏳ 执行中...' : '▶ 执行'"></span>
          </button>
        </div>

        <!-- Editor + Output Layout -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md);height:calc(100vh - 260px)">
          <!-- Code Editor -->
          <div class="card" style="display:flex;flex-direction:column;padding:0">
            <div style="padding:var(--space-sm) var(--space-md);border-bottom:1px solid var(--border);
                        display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:0.8rem;font-weight:600;color:var(--text-secondary)">
                代码 (<span x-text="language"></span>)
              </span>
              <span style="font-size:0.75rem;color:var(--text-tertiary)">
                行数: <span x-text="code.split('\n').length"></span>
              </span>
            </div>
            <textarea x-model="code"
                      style="flex:1;border:none;border-radius:0;resize:none;font-family:var(--font-mono,monospace);font-size:0.85rem;line-height:1.6;padding:var(--space-md);tab-size:2"
                      :placeholder="'输入 ' + language + ' 代码...'"
                      :disabled="executing"
                      spellcheck="false"></textarea>
          </div>

          <!-- Output Panel -->
          <div class="card" style="display:flex;flex-direction:column;padding:0">
            <div style="padding:var(--space-sm) var(--space-md);border-bottom:1px solid var(--border);
                        display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:0.8rem;font-weight:600;color:var(--text-secondary)">输出</span>
              <div style="display:flex;gap:var(--space-sm);align-items:center">
                <span x-show="executionTime" style="font-size:0.75rem;color:var(--text-tertiary)">
                  耗时: <span x-text="executionTime"></span>s
                </span>
                <button class="btn btn-sm btn-ghost" @click="clearOutput()" x-show="output" style="font-size:0.75rem">清空</button>
              </div>
            </div>
            <div style="flex:1;overflow:auto;padding:var(--space-md);font-family:var(--font-mono,monospace);font-size:0.85rem;line-height:1.6;white-space:pre-wrap;word-break:break-all">

              <!-- Executing indicator -->
              <div x-show="executing" style="display:flex;align-items:center;gap:var(--space-sm);color:var(--text-tertiary)">
                <span class="chat-typing">
                  <span class="chat-typing-dot"></span>
                  <span class="chat-typing-dot"></span>
                  <span class="chat-typing-dot"></span>
                </span>
                <span>执行中...</span>
              </div>

              <!-- Empty output state -->
              <div x-show="!executing && !output" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-tertiary);text-align:center">
                <div style="font-size:2rem;margin-bottom:var(--space-sm)">🔧</div>
                <div style="font-size:0.9rem">编写代码并点击执行查看输出</div>
              </div>

              <!-- Output -->
              <div x-show="!executing && output"
                   :class="outputType === 'error' ? '' : ''"
                   x-text="output"
                   :style="outputType === 'error' ? 'color:var(--error)' : ''"></div>
            </div>
          </div>
        </div>
      </div>
      <div id="view-settings" x-show="$store.view.isActive('settings')" x-transition.opacity.duration.250ms>
        <div x-data="settings">
          <template x-if="loading">
            <div>
              <div class="card" style="margin-bottom:var(--space-md)">
                <div class="skeleton skeleton-text"></div>
                <div class="skeleton skeleton-text" style="width:60%"></div>
              </div>
              <div class="card">
                <div class="skeleton skeleton-text"></div>
                <div class="skeleton skeleton-text" style="width:40%"></div>
              </div>
            </div>
          </template>

          <template x-if="!loading && error">
            <div class="empty-state">
              <div class="empty-state-icon">⚠️</div>
              <div class="empty-state-text" x-text="error"></div>
              <button class="btn btn-primary" @click="load()">重试</button>
            </div>
          </template>

          <template x-if="!loading && !error">
            <div>
              <!-- AI Config -->
              <div class="card" style="margin-bottom:var(--space-md)">
                <div class="card-header"><h3>🤖 AI 配置</h3></div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md)">
                  <div class="form-group"><label>模型</label>
                    <input x-model="configForm.model" placeholder="gpt-4">
                  </div>
                  <div class="form-group"><label>Temperature</label>
                    <input type="number" x-model="configForm.temperature" step="0.1" min="0" max="2">
                  </div>
                  <div class="form-group"><label>Max Tokens</label>
                    <input type="number" x-model="configForm.max_tokens" step="1" min="1" max="32768">
                  </div>
                  <div class="form-group"><label>API Base</label>
                    <input x-model="configForm.api_base" placeholder="https://api.openai.com/v1">
                  </div>
                </div>
                <div style="display:flex;gap:var(--space-sm);margin-top:var(--space-md)">
                  <button class="btn btn-primary btn-sm" @click="saveConfig()">保存配置</button>
                  <button class="btn btn-sm" @click="testConnection()">测试连接</button>
                </div>
              </div>

              <!-- Appearance -->
              <div class="card" style="margin-bottom:var(--space-md)">
                <div class="card-header"><h3>🎨 外观</h3></div>
                <div style="display:flex;align-items:center;gap:var(--space-sm)">
                  <span style="font-size:0.9rem">主题</span>
                  <button class="btn btn-sm" @click="$store.app.toggleTheme()">
                    <span x-text="$store.app.theme === 'dark' ? '☀️ 亮色' : '🌙 暗色'"></span>
                  </button>
                  <span style="font-size:0.8rem;color:var(--text-tertiary)" x-text="'当前: ' + ($store.app.theme === 'dark' ? '暗色' : '亮色')"></span>
                </div>
              </div>

              <!-- Keyboard Shortcuts -->
              <div class="card" style="margin-bottom:var(--space-md)">
                <div class="card-header"><h3>⌨️ 快捷键</h3></div>
                <div style="display:grid;grid-template-columns:auto 1fr;gap:var(--space-sm) var(--space-lg);font-size:0.875rem">
                  <span><kbd style="padding:2px 6px;background:var(--bg-tertiary);border-radius:4px;font-family:var(--font-mono);font-size:0.8rem">⌘K</kbd></span>
                  <span>命令面板 (聚焦搜索)</span>
                  <span><kbd style="padding:2px 6px;background:var(--bg-tertiary);border-radius:4px;font-family:var(--font-mono);font-size:0.8rem">⌘N</kbd></span>
                  <span>新建任务</span>
                  <span><kbd style="padding:2px 6px;background:var(--bg-tertiary);border-radius:4px;font-family:var(--font-mono);font-size:0.8rem">⌘⇧N</kbd></span>
                  <span>新建笔记</span>
                  <span><kbd style="padding:2px 6px;background:var(--bg-tertiary);border-radius:4px;font-family:var(--font-mono);font-size:0.8rem">⌘J</kbd></span>
                  <span>打开 AI 对话</span>
                  <span><kbd style="padding:2px 6px;background:var(--bg-tertiary);border-radius:4px;font-family:var(--font-mono);font-size:0.8rem">⌘B</kbd></span>
                  <span>折叠侧边栏</span>
                  <span><kbd style="padding:2px 6px;background:var(--bg-tertiary);border-radius:4px;font-family:var(--font-mono);font-size:0.8rem">⌘1-5</kbd></span>
                  <span>切换仪表盘 / 任务 / 笔记 / 习惯 / 日历</span>
                  <span><kbd style="padding:2px 6px;background:var(--bg-tertiary);border-radius:4px;font-family:var(--font-mono);font-size:0.8rem">⌘⇧T</kbd></span>
                  <span>切换主题</span>
                  <span><kbd style="padding:2px 6px;background:var(--bg-tertiary);border-radius:4px;font-family:var(--font-mono);font-size:0.8rem">Esc</kbd></span>
                  <span>关闭弹窗 / 返回</span>
                  <span><kbd style="padding:2px 6px;background:var(--bg-tertiary);border-radius:4px;font-family:var(--font-mono);font-size:0.8rem">⌘Enter</kbd></span>
                  <span>发送 / 执行</span>
                </div>
              </div>

              <!-- About -->
              <div class="card">
                <div class="card-header"><h3>ℹ️ 关于</h3></div>
                <div style="font-size:0.875rem;color:var(--text-secondary);line-height:1.8">
                  <div>应用: LocalCommandCenter</div>
                  <div>版本: <span x-text="$store.app.version || '-'"></span></div>
                  <div>状态: <span :class="$store.app.connected ? 'badge badge-completed' : 'badge badge-error'"
                                  x-text="$store.app.connected ? '已连接' : '未连接'"></span></div>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>
  </main>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modal-overlay" style="display:none" x-show="false"></div>
</div>

<script defer src="/static/js/app.js"></script>
<script defer>
document.addEventListener('alpine:init', () => {
  Alpine.data('settings', () => ({
    loading: true,
    error: null,
    configForm: { api_base: '', model: '', temperature: 0.7, max_tokens: 2048 },

    async init() {
      this.$watch('$store.view.current', (val) => {
        if (val === 'settings') this.load();
      });
      if (Alpine.store('view').current === 'settings') await this.load();
    },

    async load() {
      this.loading = true;
      this.error = null;
      try {
        const data = await fetch('/api/chat/config').then(r => r.json());
        if (data.status === 'success') {
          const cfg = data.config || data;
          this.configForm = {
            api_base: cfg.api_base || '',
            model: cfg.model || '',
            temperature: cfg.temperature ?? 0.7,
            max_tokens: cfg.max_tokens ?? 2048,
          };
        }
      } catch (e) {
        this.error = '无法加载配置';
      } finally {
        this.loading = false;
      }
    },

    async saveConfig() {
      try {
        const resp = await fetch('/api/chat/config', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(this.configForm),
        });
        const data = await resp.json();
        if (data.status === 'success') {
          window.toast ? window.toast('配置已保存', 'success') : alert('配置已保存');
        } else {
          throw new Error(data.message || '保存失败');
        }
      } catch (e) {
        window.toast ? window.toast('保存配置失败', 'error') : alert('保存配置失败');
      }
    },

    async testConnection() {
      try {
        const data = await fetch('/api/chat/test', { method: 'POST' }).then(r => r.json());
        if (data.status === 'success') {
          window.toast ? window.toast('连接测试成功', 'success') : alert('连接测试成功');
        } else {
          window.toast ? window.toast(data.message || '连接测试失败', 'error') : alert(data.message || '连接测试失败');
        }
      } catch (e) {
        window.toast ? window.toast('连接测试失败', 'error') : alert('连接测试失败');
      }
    },
  }));
});
</script>
<script type="module" src="/static/js/components/dashboard.js"></script>
<script type="module" src="/static/js/components/tasks.js"></script>
<script type="module" src="/static/js/components/notes.js"></script>
<script type="module" src="/static/js/components/habits.js"></script>
<script type="module" src="/static/js/components/calendar.js"></script>
<script type="module" src="/static/js/components/ai-chat.js"></script>
<script type="module" src="/static/js/components/workflows.js"></script>
<script type="module" src="/static/js/components/sync.js"></script>
<script type="module" src="/static/js/components/download.js"></script>
<script type="module" src="/static/js/components/sandbox.js"></script>
</body>
